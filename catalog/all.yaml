# Location index for the software catalog.
#
# This is the single entry point registered by the platform (see
# catalog.locations in app-config.yaml). It pulls in the organizational model and
# declares the core domain and system, and it registers the software templates
# offered as golden paths. Additional location targets — systems, APIs, and
# further templates — are appended to the Location below as they are onboarded.
---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: platform-bootstrap
  description: Registers the organizational model, platform-managed entities, and golden-path templates.
spec:
  type: file
  targets:
    - ./org.yaml
    - ./components.yaml
    - ../templates/microservice/template.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: platform
  title: Platform
  description: Shared platform capabilities, golden paths, and developer tooling.
spec:
  owner: platform-engineering
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: developer-platform
  title: Internal Developer Platform
  description: Service catalog, software templates, and golden paths for product teams.
  annotations:
    # Publish this repository's TechDocs site on the platform's catalog entity.
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform-engineering
  domain: platform
