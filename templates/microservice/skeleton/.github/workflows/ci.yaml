# Continuous integration for the service.
#
# Type-checks the code, runs the test suite, builds the application, and verifies
# that the container image builds cleanly. Publishing to a registry is left to the
# team to wire up with keyless (OIDC) credentials for their environment.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      # Uses `npm install` because a lock file is not committed yet. Once the
      # service commits package-lock.json, switch to `npm ci` and enable the
      # setup-node cache for faster, reproducible installs.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  image:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build container image
        run: docker build -t "${{ github.event.repository.name }}:${{ github.sha }}" .
