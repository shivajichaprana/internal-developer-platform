# Core configuration for the internal developer platform (Backstage).
#
# Secrets and environment-specific endpoints are injected at runtime via
# environment variables using ${VAR} substitution. No credentials are stored in
# this file; supply them through a git-ignored .env file or a secret manager.

app:
  title: Internal Developer Platform
  baseUrl: ${APP_BASE_URL}

organization:
  name: Platform Engineering

backend:
  baseUrl: ${BACKEND_BASE_URL}
  listen:
    port: 7007
    # Bind to all interfaces inside the container; front with a reverse proxy.
    host: 0.0.0.0
  # Content Security Policy. Keep narrow; widen deliberately per integration.
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: ${APP_BASE_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      # Require a verified TLS connection to the database outside local dev.
      ssl:
        rejectUnauthorized: true
  cache:
    store: memory

integrations:
  github:
    - host: github.com
      # GitHub App or personal access token, injected from the environment.
      # Scoped to read repository contents and run software templates.
      token: ${GITHUB_TOKEN}

# Software catalog ingestion. A single location index is the entry point; it
# registers the organizational model and the platform's core entities.
catalog:
  rules:
    - allow:
        - Component
        - System
        - Domain
        - API
        - Resource
        - Location
        - Group
        - User
        - Template
  locations:
    - type: file
      target: ./catalog/all.yaml

# TechDocs renders Markdown documentation stored alongside catalog entities
# and publishes it on each entity's page. The 'local' builder generates and
# serves docs from the backend, which is the simplest way to get started; for
# scale, switch to an 'external' builder that generates docs in CI and a cloud
# publisher (awsS3 / googleGcs / azureBlobStorage).
techdocs:
  builder: 'local'
  generator:
    # 'docker' renders with the official TechDocs container for consistent
    # output; 'local' uses a host MkDocs install with mkdocs-techdocs-core.
    runIn: 'docker'
  publisher:
    type: 'local'

auth:
  # Literal environment selector (not a secret). Override per deployment.
  environment: development
  providers:
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}

# Scaffolder (software templates) is configured with its template set.
scaffolder: {}

# Kubernetes plugin wiring. The catalog surfaces live workload state for any
# entity annotated with backstage.io/kubernetes-id; the backend reads from the
# clusters listed here. Cluster endpoints and credentials are injected from
# the environment — no cluster data is stored in this file.
kubernetes:
  serviceLocatorMethod:
    # Query every configured cluster for each entity's workloads.
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: primary
          url: ${K8S_CLUSTER_URL}
          # Read-only service account bearer token. Grant get/list/watch on
          # workload objects only (Deployments, ReplicaSets, Pods, Services,
          # HorizontalPodAutoscalers, Ingresses) — never cluster-admin.
          authProvider: serviceAccount
          serviceAccountToken: ${K8S_SA_TOKEN}
          # Base64-encoded CA bundle for the cluster endpoint. Ship the CA
          # instead of disabling TLS verification.
          caData: ${K8S_CA_DATA}
          skipTLSVerify: false
          skipMetricsLookup: false
  # Custom resources to surface on entity Kubernetes tabs alongside the
  # built-in workload types.
  customResources:
    - group: argoproj.io
      apiVersion: v1alpha1
      plural: rollouts

# Role-based access control over catalog, scaffolder, Kubernetes, and the
# permission administration endpoints. Role definitions and grants live in
# permissions/rbac-policy.csv; owner- and annotation-scoped refinements live
# in permissions/policy.yaml. Both files hot-reload on change.
permission:
  enabled: true
  rbac:
    policies-csv-file: ./permissions/rbac-policy.csv
    conditionalPoliciesFile: ./permissions/policy.yaml
    policyFileReload: true
    pluginsWithPermission:
      - catalog
      - scaffolder
      - permission
      - kubernetes
    admin:
      users:
        - name: user:default/platform-admin
      superUsers:
        - name: user:default/platform-admin
